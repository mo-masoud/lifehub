services:
  - type: web
    name: lifehub
    env: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      yarn install && yarn build
      php artisan event:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://lifehub.onrender.com
      - key: ASSET_URL
        value: https://lifehub.onrender.com
      - key: DB_CONNECTION
        value: sqlite
